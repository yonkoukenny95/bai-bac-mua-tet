<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Mini app tính điểm Tiến Lên Miền Nam chạy trên GitHub Pages" />
    <title>Card Score Mini App</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow mb-1">GitHub Pages · Mobile First</p>
          <h1 class="app-title mb-0">Card Score Mini App</h1>
        </div>
        <button id="installBtn" class="btn btn-sm btn-outline-light d-none">Cài app</button>
      </header>

      <main class="app-main container-fluid px-3 px-sm-4">
        <section id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></section>

        <section id="stepperSection" class="card-panel wizard-panel"></section>
        <section id="contentSection" class="content-panel"></section>
      </main>
    </div>

    <dialog id="roundDialog" class="app-dialog round-dialog"></dialog>
    <dialog id="summaryDialog" class="app-dialog"></dialog>
    <dialog id="confirmDialog" class="app-dialog confirm-dialog"></dialog>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
